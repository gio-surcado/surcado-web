<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Marketplace — Surcado</title>
  <link rel="icon" href="/assets/logos/Icon_Surcado_blue.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #5151C6;
      --blue-dark: #1E2254;
      --blue-bg: #EEEEF9;
      --teal: #28D4C5;
      --teal-soft: rgba(40, 212, 197, 0.12);
      --gold: #F5B72E;
      --gold-soft: rgba(245, 183, 46, 0.15);
      --gray-light: #F3F5F9;
      --text: #1A1A2E;
      --muted: #6B6B8A;
      --white: #ffffff;
    }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--blue-bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 32px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    /* ---------- TOP BAR ---------- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: var(--white);
    }

    .topbar img {
      height: 22px;
    }

    /* ---------- WELCOME ---------- */
    .welcome {
      padding: 24px 20px 16px;
    }

    .welcome h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .welcome p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .count-pill {
      display: inline-block;
      background: var(--teal-soft);
      color: #0F8378;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 800;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ---------- GRID ---------- */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0 12px;
    }

    /* ---------- CARD ---------- */
    .card {
      display: block;
      background: var(--white);
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 4px 16px rgba(81, 81, 198, 0.06);
      transition: all 0.2s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(81, 81, 198, 0.12);
    }

    .card:active {
      transform: translateY(0);
    }

    .card-photo {
      aspect-ratio: 16/10;
      background: var(--gray-light);
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-photo .placeholder {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .card-photo .placeholder .icon {
      display: block;
      font-size: 36px;
      margin-bottom: 6px;
      opacity: 0.5;
    }

    .card-sello {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--gold);
      color: var(--white);
      padding: 5px 10px;
      border-radius: 100px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 4px 12px rgba(245, 183, 46, 0.4);
    }

    .card-info {
      padding: 16px 18px 18px;
    }

    .card-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 17px;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 2px;
    }

    .card-meta {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 12px;
    }

    .card-price {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--blue);
      margin-bottom: 8px;
    }

    .card-location {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ---------- EMPTY / LOADING ---------- */
    .state-screen {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .state-screen .icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .state-screen .title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .state-screen .sub {
      color: var(--muted);
      font-size: 15px;
      max-width: 320px;
      line-height: 1.6;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <img src="/assets/logos/Surcado_blue.png" alt="Surcado">
  </div>

  <!-- Loading -->
  <div class="state-screen" id="loading-state">
    <div class="icon">⏳</div>
    <div class="title">Cargando autos...</div>
  </div>

  <!-- Empty -->
  <div class="state-screen hidden" id="empty-state">
    <div class="icon">🚗</div>
    <div class="title">Todavía no hay autos disponibles</div>
    <div class="sub">Volvé pronto, vamos a tener publicaciones nuevas en breve.</div>
  </div>

  <!-- Error -->
  <div class="state-screen hidden" id="error-state">
    <div class="icon">⚠️</div>
    <div class="title">Hubo un problema</div>
    <div class="sub">No pudimos cargar el listado. Probá refrescando la página.</div>
  </div>

  <!-- Content -->
  <div class="hidden" id="content">
    <div class="welcome">
      <h1>Marketplace</h1>
      <p>Autos verificados, contacto seguro por WhatsApp.</p>
      <div class="count-pill" id="count-pill"></div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

</div>

<script>
  // ---- Helpers ----
  const formatPrice = (n) => n ? '$' + Number(n).toLocaleString('es-AR') : '';
  const formatKm = (n) => n ? Number(n).toLocaleString('es-AR') + ' km' : '';

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  // ---- Render card ----
  function buildCard(car) {
    const title = [car.marca, car.modelo, car.anio].filter(Boolean).join(' ');
    const meta = [car.version, formatKm(car.kilometros)].filter(Boolean).join(' · ');
    const location = [car.localidad, car.provincia].filter(Boolean).join(', ') || 'Argentina';

    const fotos = Array.isArray(car.fotos) ? car.fotos : [];
    const photoStyle = fotos.length > 0 ? `background-image: url(${fotos[0]})` : '';
    const placeholder = fotos.length === 0
      ? `<div class="placeholder"><span class="icon">📷</span>Sin foto</div>`
      : '';

    const sello = car.sello_verificado
      ? `<span class="card-sello">⭐ Verificado</span>`
      : '';

    return `
      <a class="card" href="/marketplace-x7k2/${car.id}">
        <div class="card-photo" style="${photoStyle}">
          ${placeholder}
          ${sello}
        </div>
        <div class="card-info">
          <div class="card-title">${title}</div>
          ${meta ? `<div class="card-meta">${meta}</div>` : ''}
          <div class="card-price">${formatPrice(car.precio_publicacion)}</div>
          <div class="card-location"><span>📍</span> <span>${location}</span></div>
        </div>
      </a>
    `;
  }

  // ---- Fetch ----
  async function cargarListado() {
    try {
      const res = await fetch('https://n8n.surcado.com/webhook/marketplace-listado', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}'
      });
      if (!res.ok) throw new Error('Webhook respondió ' + res.status);
      const data = await res.json();
      const listings = Array.isArray(data) ? data : [];

      hide('loading-state');

      if (listings.length === 0) {
        show('empty-state');
        return;
      }

      // Render grid
      document.getElementById('grid').innerHTML = listings.map(buildCard).join('');

      // Count pill
      const count = listings.length;
      document.getElementById('count-pill').textContent =
        count === 1 ? '1 auto disponible' : `${count} autos disponibles`;

      show('content');
    } catch (err) {
      console.error('Error cargando listado:', err);
      hide('loading-state');
      show('error-state');
    }
  }

  cargarListado();
</script>

</body>
</html>
